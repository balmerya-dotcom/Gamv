<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zombie Alley Defense 3.0</title>
<style>
body{margin:0;overflow:hidden;background:#0b0b0b;font-family:Arial}
canvas{display:block}
#baseUI{
position:absolute;top:10px;left:10px;color:#00ffcc;font-size:18px;
}
#playerUI{
position:absolute;top:10px;right:10px;color:#00ffcc;font-size:18px;text-align:right;
}
#menu,#pauseMenu,#shopMenu{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:20px;
color:white;
border:2px solid #00ffcc;
text-align:center;
}
button{padding:10px;margin:5px;background:#00ffcc;border:none}
</style>
</head>
<body>

<div id="menu">
<h1>Zombie Alley Defense</h1>
<button onclick="startGame()">Start Game</button>
</div>

<div id="pauseMenu" style="display:none;">
<h2>Paused</h2>
<button onclick="resumeGame()">Resume</button>
</div>

<div id="shopMenu" style="display:none;">
<h2>Wave Complete</h2>
<button onclick="buyHealth()">Base HP +50 ($50)</button><br>
<button onclick="buyDamage()">Damage +1 ($75)</button><br>
<button onclick="hireSoldier()">Hire Soldier ($100)</button><br>
<button onclick="craftAmmo()">Craft Ammo (5 wood + 5 stone)</button><br>
<button onclick="nextWave()">Next Wave</button>
</div>

<div id="baseUI" style="display:none;">
Base HP: <span id="baseHP">300</span><br>
Wave: <span id="waveCount">1</span>
</div>

<div id="playerUI" style="display:none;">
HP: <span id="playerHP">10</span><br>
Ammo: <span id="ammoCount">5</span><br>
Weapon: <span id="weaponName">Pistol</span><br>
Fuel: <span id="fuel">100</span><br>
Wood: <span id="wood">0</span><br>
Stone: <span id="stone">0</span><br>
Money: $<span id="money">0</span>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let gameStarted=false,paused=false,wave=1,money=0,kills=0;
let wood=0,stone=0;
let soldiers=[],zombies=[],walls=[],trees=[],rocks=[];

let base={x:canvas.width/2,y:canvas.height/2,w:100,h:100,hp:300,maxHp:300};

let player={
x:200,y:200,size:15,speed:3,damage:1,
hits:0,weapon:"pistol",
ammo:5,maxAmmo:5,reloading:false,
fuel:100
};

let keys={},mouse={x:0,y:0,down:false};

document.addEventListener("keydown",e=>{
keys[e.key]=true;
if(e.key==="Escape" && gameStarted){
paused=!paused;
document.getElementById("pauseMenu").style.display=paused?"block":"none";
}
if(e.key==="1")switchWeapon("pistol");
if(e.key==="2")switchWeapon("rifle");
if(e.key==="3")switchWeapon("flame");
if(e.key==="e")mine();
});
document.addEventListener("keyup",e=>keys[e.key]=false);

canvas.addEventListener("mousemove",e=>{
mouse.x=e.clientX;
mouse.y=e.clientY;
});
canvas.addEventListener("mousedown",()=>mouse.down=true);
canvas.addEventListener("mouseup",()=>mouse.down=false);

function startGame(){
gameStarted=true;
document.getElementById("menu").style.display="none";
document.getElementById("baseUI").style.display="block";
document.getElementById("playerUI").style.display="block";
spawnMap();
spawnWave();
}

function resumeGame(){
paused=false;
document.getElementById("pauseMenu").style.display="none";
}

function switchWeapon(type){
player.weapon=type;
if(type==="pistol"){player.maxAmmo=5;}
if(type==="rifle"){player.maxAmmo=30;}
player.ammo=player.maxAmmo;
}

function spawnMap(){
for(let i=0;i<12;i++){
walls.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,w:200,h:30});
}
for(let i=0;i<15;i++){
trees.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,size:25});
rocks.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,size:20});
}
}

function spawnWave(){
for(let i=0;i<wave*15;i++){
zombies.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:15,
hp:5+wave,
maxHp:5+wave,
speed:1
});
}
}

function mine(){
for(let t of trees){
if(Math.hypot(player.x-t.x,player.y-t.y)<40){
wood+=2;
}
}
for(let r of rocks){
if(Math.hypot(player.x-r.x,player.y-r.y)<40){
stone+=2;
}
}
}

function craftAmmo(){
if(wood>=5 && stone>=5){
wood-=5;stone-=5;
player.ammo=player.maxAmmo;
}
}

function hireSoldier(){
if(money>=100){
money-=100;
soldiers.push({x:base.x,y:base.y,damage:0.5});
}
}

function buyHealth(){
if(money>=50){
money-=50;base.maxHp+=50;base.hp=base.maxHp;
}
}

function buyDamage(){
if(money>=75){
money-=75;player.damage+=1;
}
}

function nextWave(){
document.getElementById("shopMenu").style.display="none";
paused=false;wave++;
spawnWave();
}

function movePlayer(){
let nx=player.x,ny=player.y;
if(keys["w"])ny-=player.speed;
if(keys["s"])ny+=player.speed;
if(keys["a"])nx-=player.speed;
if(keys["d"])nx+=player.speed;
player.x=nx;player.y=ny;
}

function shoot(){
if(player.weapon==="flame"){
if(player.fuel<=0) return;
player.fuel-=0.5;
for(let z of zombies){
if(Math.hypot(player.x-z.x,player.y-z.y)<80){
z.hp-=0.2;
}
}
return;
}
if(player.reloading) return;
if(player.ammo<=0){reload();return;}
player.ammo--;

for(let z of zombies){
if(Math.hypot(mouse.x-z.x,mouse.y-z.y)<z.size){
z.hp-=player.damage;
if(z.hp<=0){
money+=10;kills++;
}
}
}
}

function reload(){
player.reloading=true;
setTimeout(()=>{
player.ammo=player.maxAmmo;
player.reloading=false;
},1000);
}

function updateZombies(){
for(let z of zombies){
let dx=base.x-z.x,dy=base.y-z.y;
let dist=Math.hypot(dx,dy);
z.x+=dx/dist*z.speed;
z.y+=dy/dist*z.speed;

if(dist<60)base.hp-=0.2;
if(Math.hypot(player.x-z.x,player.y-z.y)<20){
player.hits++;
if(player.hits>=10){alert("You Died");location.reload();}
}
}
zombies=zombies.filter(z=>z.hp>0);
if(zombies.length===0){
paused=true;
document.getElementById("shopMenu").style.display="block";
}
}

function updateSoldiers(){
for(let s of soldiers){
for(let z of zombies){
if(Math.hypot(s.x-z.x,s.y-z.y)<150){
z.hp-=s.damage;
}
}
}
}

function draw(){
ctx.fillStyle="#1a1a1a";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#333";
for(let w of walls)ctx.fillRect(w.x,w.y,w.w,w.h);

ctx.fillStyle="green";
for(let t of trees){
ctx.beginPath();ctx.arc(t.x,t.y,t.size,0,Math.PI*2);ctx.fill();
}

ctx.fillStyle="gray";
for(let r of rocks){
ctx.beginPath();ctx.arc(r.x,r.y,r.size,0,Math.PI*2);ctx.fill();
}

ctx.fillStyle="#004466";
ctx.fillRect(base.x-50,base.y-50,100,100);

ctx.fillStyle="white";
ctx.beginPath();ctx.arc(player.x,player.y,player.size,0,Math.PI*2);ctx.fill();

ctx.strokeStyle="yellow";
ctx.beginPath();
ctx.moveTo(player.x,player.y);
ctx.lineTo(mouse.x,mouse.y);
ctx.stroke();

ctx.strokeStyle="white";
ctx.beginPath();
ctx.moveTo(mouse.x-10,mouse.y);
ctx.lineTo(mouse.x+10,mouse.y);
ctx.moveTo(mouse.x,mouse.y-10);
ctx.lineTo(mouse.x,mouse.y+10);
ctx.stroke();

for(let z of zombies){
ctx.fillStyle="red";
ctx.fillRect(z.x-10,z.y-10,20,20);

ctx.fillStyle="black";
ctx.fillRect(z.x-15,z.y-20,30,5);
ctx.fillStyle="lime";
ctx.fillRect(z.x-15,z.y-20,30*(z.hp/z.maxHp),5);
}

ctx.fillStyle="cyan";
for(let s of soldiers){
ctx.fillRect(s.x-5,s.y-5,10,10);
}

document.getElementById("baseHP").textContent=Math.floor(base.hp);
document.getElementById("waveCount").textContent=wave;
document.getElementById("playerHP").textContent=10-player.hits;
document.getElementById("ammoCount").textContent=player.ammo;
document.getElementById("weaponName").textContent=player.weapon;
document.getElementById("money").textContent=money;
document.getElementById("fuel").textContent=Math.floor(player.fuel);
document.getElementById("wood").textContent=wood;
document.getElementById("stone").textContent=stone;
}

function gameLoop(){
if(gameStarted && !paused){
movePlayer();
if(mouse.down)shoot();
updateZombies();
updateSoldiers();
if(base.hp<=0){alert("Base Destroyed");location.reload();}
}
draw();
requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
