<!DOCTYPE html>
<html>
<head>
<title>Zombie Survival</title>
<style>
body { margin:0; overflow:hidden; background:black; }
canvas { background:#111; display:block; }
#menu {
    position:absolute;
    width:100%;
    height:100%;
    background:black;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Arial;
}
button {
    padding:15px 30px;
    font-size:20px;
    cursor:pointer;
}
</style>
</head>
<body>

<div id="menu">
    <h1>Zombie Survival</h1>
    <button onclick="startGame()">Start Game</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gameRunning = false;
let keys = {};
let mouseX = 0;
let mouseY = 0;
let showCrosshair = false;

let camera = { x:0, y:0 };

let player = {
    x:0,
    y:0,
    size:20,
    speed:4,
    health:100
};

let zombies = [];
let bullets = [];
let kills = 0;

// -------- START GAME --------
function startGame(){
    document.getElementById("menu").style.display="none";
    gameRunning = true;
    spawnZombie();
    update();
}

// -------- CONTROLS --------
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

document.addEventListener("mousemove", e=>{
    mouseX = e.clientX;
    mouseY = e.clientY;
    showCrosshair = true;
});

document.addEventListener("click", shoot);

// -------- SHOOT --------
function shoot(){
    if(!gameRunning) return;

    let angle = Math.atan2(
        mouseY - canvas.height/2,
        mouseX - canvas.width/2
    );

    bullets.push({
        x: player.x,
        y: player.y,
        dx: Math.cos(angle)*10,
        dy: Math.sin(angle)*10
    });
}

// -------- SPAWN ZOMBIE --------
function spawnZombie(){
    let angle = Math.random()*Math.PI*2;
    let distance = 800;

    zombies.push({
        x: player.x + Math.cos(angle)*distance,
        y: player.y + Math.sin(angle)*distance,
        size:20,
        speed:1,   // SLOW ZOMBIES
        health:1
    });
}

// -------- SPAWN BOSS --------
function spawnBoss(){
    zombies.push({
        x: player.x + 600,
        y: player.y,
        size:40,
        speed:0.7,
        health:10
    });
}

// -------- UPDATE LOOP --------
function update(){
    if(!gameRunning) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Smooth Player Movement
    if(keys["w"]) player.y -= player.speed;
    if(keys["s"]) player.y += player.speed;
    if(keys["a"]) player.x -= player.speed;
    if(keys["d"]) player.x += player.speed;

    // Camera follows player smoothly
    camera.x = player.x - canvas.width/2;
    camera.y = player.y - canvas.height/2;

    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    // Draw Player
    ctx.fillStyle = "blue";
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.size, 0, Math.PI*2);
    ctx.fill();

    // Draw Zombies
    zombies.forEach((z, zi)=>{
        let dx = player.x - z.x;
        let dy = player.y - z.y;
        let dist = Math.hypot(dx, dy);

        if(dist > 5){
            z.x += (dx/dist) * z.speed;
            z.y += (dy/dist) * z.speed;
        }

        ctx.fillStyle = z.health > 1 ? "purple" : "green";
        ctx.beginPath();
        ctx.arc(z.x, z.y, z.size, 0, Math.PI*2);
        ctx.fill();

        // Collision with player
        if(dist < z.size + player.size){
            player.health -= 0.1;
        }
    });

    // Draw Bullets
    bullets.forEach((b, bi)=>{
        b.x += b.dx;
        b.y += b.dy;

        ctx.fillStyle = "yellow";
        ctx.beginPath();
        ctx.arc(b.x, b.y, 5, 0, Math.PI*2);
        ctx.fill();

        // Bullet hit zombie
        zombies.forEach((z, zi)=>{
            if(Math.hypot(b.x - z.x, b.y - z.y) < z.size){
                z.health--;
                bullets.splice(bi,1);

                if(z.health <= 0){
                    zombies.splice(zi,1);
                    kills++;
                    spawnZombie();

                    if(kills % 100 === 0){
                        spawnBoss();
                    }
                }
            }
        });
    });

    ctx.restore();

    // Draw UI
    ctx.fillStyle="white";
    ctx.fillText("Health: " + Math.floor(player.health),20,30);
    ctx.fillText("Kills: " + kills,20,50);

    // Draw Crosshair (follows mouse)
    if(showCrosshair){
        ctx.strokeStyle="red";
        ctx.beginPath();
        ctx.moveTo(mouseX-10,mouseY);
        ctx.lineTo(mouseX+10,mouseY);
        ctx.moveTo(mouseX,mouseY-10);
        ctx.lineTo(mouseX,mouseY+10);
        ctx.stroke();
    }

    requestAnimationFrame(update);
}
</script>

</body>
</html>
