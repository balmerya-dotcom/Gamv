<!DOCTYPE html>
<html>
<head>
<title>Zombie Survival</title>
<style>
body { margin:0; overflow:hidden; background:black; color:white; font-family:Arial; }
canvas { display:block; }

.screen {
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:black;
}

button {
    padding:15px 30px;
    font-size:20px;
    margin:10px;
    cursor:pointer;
}
</style>
</head>
<body>

<div id="mainMenu" class="screen">
    <h1>ZOMBIE SURVIVAL</h1>
    <button onclick="startGame()">START</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

let gameRunning = false;
let kills = 0;

let player = {
    x: canvas.width/2,
    y: canvas.height/2,
    speed: 4,
    health: 100,
    weapon: "rifle",
    ammo: 5,
    maxAmmo: 5,
    reloading: false
};

let zombies = [];
let bullets = [];
let keys = {};
let lastShot = 0;

function startGame(){
    document.getElementById("mainMenu").style.display="none";
    canvas.requestPointerLock();
    gameRunning = true;
    spawnZombies();
}

function reload(){
    if(player.reloading) return;
    player.reloading = true;
    setTimeout(()=>{
        player.ammo = player.maxAmmo;
        player.reloading = false;
    },1500);
}

document.addEventListener("keydown", e=>{
    keys[e.key]=true;
    if(e.key==="r") reload();
});
document.addEventListener("keyup", e=> keys[e.key]=false);

document.addEventListener("click", ()=>{
    if(!gameRunning) return;
    if(Date.now()-lastShot < 800) return;
    if(player.ammo<=0) return;

    lastShot = Date.now();
    player.ammo--;

    bullets.push({x:player.x,y:player.y,damage:999});
});

function spawnZombies(){
    setInterval(()=>{
        if(!gameRunning) return;

        if(kills>0 && kills%20===0){
            zombies.push({
                x:Math.random()*canvas.width,
                y:Math.random()*canvas.height,
                health:200,
                boss:true
            });
            kills++;
        } else {
            zombies.push({
                x:Math.random()*canvas.width,
                y:Math.random()*canvas.height,
                health:10,
                boss:false
            });
        }
    },2000);
}

function update(){
    if(!gameRunning) return;

    if(keys["w"]) player.y -= player.speed;
    if(keys["s"]) player.y += player.speed;
    if(keys["a"]) player.x -= player.speed;
    if(keys["d"]) player.x += player.speed;

    zombies.forEach((z,zi)=>{
        let dx = player.x-z.x;
        let dy = player.y-z.y;
        let d = Math.hypot(dx,dy);

        z.x += dx/d*(z.boss?0.5:1);
        z.y += dy/d*(z.boss?0.5:1);

        if(d<20) player.health -= z.boss?1:0.3;

        bullets.forEach((b,bi)=>{
            if(Math.hypot(z.x-b.x,z.y-b.y)<20){
                z.health -= b.damage;
                bullets.splice(bi,1);
                if(z.health<=0){
                    zombies.splice(zi,1);
                    kills++;
                }
            }
        });
    });

    draw();
    requestAnimationFrame(update);
}

function draw(){
    ctx.fillStyle="#111";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="blue";
    ctx.beginPath();
    ctx.arc(player.x,player.y,15,0,Math.PI*2);
    ctx.fill();

    zombies.forEach(z=>{
        ctx.fillStyle=z.boss?"purple":"green";
        ctx.beginPath();
        ctx.arc(z.x,z.y,z.boss?25:15,0,Math.PI*2);
        ctx.fill();
    });

    ctx.fillStyle="white";
    ctx.fillText("HP: "+Math.floor(player.health),20,30);
    ctx.fillText("Ammo: "+player.ammo+"/"+player.maxAmmo,20,50);
    ctx.fillText("Kills: "+kills,20,70);

    if(player.reloading){
        ctx.fillStyle="yellow";
        ctx.fillText("RELOADING...", canvas.width/2-50, canvas.height/2);
    }

    if(player.health<=0){
        ctx.fillStyle="red";
        ctx.font="50px Arial";
        ctx.fillText("GAME OVER", canvas.width/2-150, canvas.height/2);
        gameRunning=false;
    }
}

update();
</script>

</body>
</html>
