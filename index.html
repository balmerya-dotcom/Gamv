<!DOCTYPE html>
<html>
<head>
<title>Zombie Survival</title>
<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; background:#0f0f0f; }

#menu, #deathShop {
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
color:white;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
}

button{
padding:12px 25px;
margin:10px;
font-size:18px;
cursor:pointer;
}

#deathShop { display:none; }
</style>
</head>
<body>

<div id="menu">
<h1>Zombie Survival</h1>
<button onclick="startGame()">Start Game</button>
</div>

<div id="deathShop">
<h2>You Died</h2>
<p>Money: $<span id="moneyDisplay">0</span></p>
<button onclick="buyDamage()">Damage +20% ($200)</button>
<button onclick="buySpeed()">Speed +20% ($200)</button>
<button onclick="buyHealth()">+2 Max Hits ($300)</button>
<button onclick="restartGame()">Restart</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let gameRunning=false;
let mouseX=0, mouseY=0;
let mouseDown=false;
let keys={};

let player={
x:0,y:0,size:20,
speed:4,
damage:1,
ammo:30,maxAmmo:30,
reloading:false,
money:0,
maxHits:10,
hits:0
};

let zombies=[];
let bullets=[];
let kills=0;
let lastShot=0;

// START
function startGame(){
document.getElementById("menu").style.display="none";
resetWorld();
gameRunning=true;
update();
}

function resetWorld(){
player.x=0;
player.y=0;
player.hits=0;
player.ammo=player.maxAmmo;
zombies=[];
bullets=[];
kills=0;
spawnWave();
}

// CONTROLS
document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true;
if(e.key==="r") reload();
});
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);
document.addEventListener("mousemove",e=>{
mouseX=e.clientX;
mouseY=e.clientY;
});
document.addEventListener("mousedown",()=>mouseDown=true);
document.addEventListener("mouseup",()=>mouseDown=false);

// SHOOT AUTO
function shoot(){
if(!gameRunning) return;
if(player.reloading) return;
if(player.ammo<=0) return;

let now=Date.now();
if(now-lastShot<90) return;
lastShot=now;

let angle=Math.atan2(mouseY-canvas.height/2,mouseX-canvas.width/2);

bullets.push({
x:player.x,
y:player.y,
dx:Math.cos(angle)*13,
dy:Math.sin(angle)*13
});

player.ammo--;
}

function reload(){
if(player.reloading) return;
if(player.ammo===player.maxAmmo) return;

player.reloading=true;
setTimeout(()=>{
player.ammo=player.maxAmmo;
player.reloading=false;
},1000);
}

// SPAWN LOTS OF ZOMBIES
function spawnZombie(isBoss=false){
let angle=Math.random()*Math.PI*2;
let distance=800;

zombies.push({
x:player.x+Math.cos(angle)*distance,
y:player.y+Math.sin(angle)*distance,
size:isBoss?40:20,
speed:isBoss?0.7:1.2,
health:isBoss?15:2,
boss:isBoss
});
}

function spawnWave(){
for(let i=0;i<20;i++){ // 10x more chaos
spawnZombie(false);
}
}

// UPDATE LOOP
function update(){
if(!gameRunning) return;

ctx.clearRect(0,0,canvas.width,canvas.height);

if(keys["w"]) player.y-=player.speed;
if(keys["s"]) player.y+=player.speed;
if(keys["a"]) player.x-=player.speed;
if(keys["d"]) player.x+=player.speed;

if(mouseDown) shoot();

ctx.save();
ctx.translate(canvas.width/2-player.x,canvas.height/2-player.y);

// ALLEY STYLE BACKGROUND
for(let i=-2000;i<2000;i+=200){
ctx.fillStyle="#181818";
ctx.fillRect(i,-2000,100,4000);
}

// PLAYER
ctx.fillStyle="blue";
ctx.beginPath();
ctx.arc(player.x,player.y,player.size,0,Math.PI*2);
ctx.fill();

// ZOMBIES
zombies.forEach((z,zi)=>{
let dx=player.x-z.x;
let dy=player.y-z.y;
let dist=Math.hypot(dx,dy);

z.x+=(dx/dist)*z.speed;
z.y+=(dy/dist)*z.speed;

ctx.fillStyle=z.boss?"purple":"green";
ctx.beginPath();
ctx.arc(z.x,z.y,z.size,0,Math.PI*2);
ctx.fill();

if(dist<z.size+player.size){
player.hits++;
zombies.splice(zi,1);
if(player.hits>=player.maxHits){
die();
}
}
});

// BULLETS
bullets.forEach((b,bi)=>{
b.x+=b.dx;
b.y+=b.dy;

ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(b.x,b.y,4,0,Math.PI*2);
ctx.fill();

zombies.forEach((z,zi)=>{
if(Math.hypot(b.x-z.x,b.y-z.y)<z.size){
z.health-=player.damage;
bullets.splice(bi,1);

if(z.health<=0){
player.money+=z.boss?300:50;
zombies.splice(zi,1);
kills++;

if(kills%10===0){
spawnZombie(true); // boss every 10 kills
}

spawnZombie(false);
}
}
});
});

ctx.restore();

// UI
ctx.fillStyle="white";
ctx.fillText("Hits: "+player.hits+"/"+player.maxHits,20,30);
ctx.fillText("Money: $"+player.money,20,50);
ctx.fillText("Ammo: "+player.ammo+"/"+player.maxAmmo,20,70);
ctx.fillText("Kills: "+kills,20,90);

if(player.reloading) ctx.fillText("Reloading...",20,110);

requestAnimationFrame(update);
}

// DEATH
function die(){
gameRunning=false;
document.getElementById("deathShop").style.display="flex";
document.getElementById("moneyDisplay").innerText=player.money;
}

// SHOP AFTER DEATH
function buyDamage(){
if(player.money>=200){
player.money-=200;
player.damage*=1.2;
updateMoney();
}
}

function buySpeed(){
if(player.money>=200){
player.money-=200;
player.speed*=1.2;
updateMoney();
}
}

function buyHealth(){
if(player.money>=300){
player.money-=300;
player.maxHits+=2;
updateMoney();
}
}

function updateMoney(){
document.getElementById("moneyDisplay").innerText=player.money;
}

function restartGame(){
document.getElementById("deathShop").style.display="none";
resetWorld();
gameRunning=true;
update();
}
</script>
</body>
</html>
