<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zombie Base Defense</title>
<style>
body{margin:0;overflow:hidden;background:#111;color:white;font-family:Arial}
canvas{background:#222;display:block}
#ui{position:absolute;top:10px;right:10px;font-size:18px}
#pauseMenu{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#000;
padding:20px;
display:none;
text-align:center;
border:2px solid white;
}
button{padding:10px;margin:5px}
</style>
</head>
<body>

<div id="ui">
Waves: <span id="waveCount">0</span><br>
Base HP: <span id="baseHP">100</span><br>
Your HP: <span id="playerHP">10</span>
</div>

<div id="pauseMenu">
<h2>Paused</h2>
<button onclick="resumeGame()">Resume</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let paused=false;
let wave=0;
let zombies=[];
let trees=[];
let rocks=[];
let soldiers=[];
let base={x:canvas.width/2,y:canvas.height/2,size:60,hp:100};

let player={
x:200,
y:200,
size:20,
speed:3,
hp:10
};

let keys={};

document.addEventListener("keydown",e=>{
keys[e.key]=true;
if(e.key==="Escape"){
paused=!paused;
document.getElementById("pauseMenu").style.display=paused?"block":"none";
}
});
document.addEventListener("keyup",e=>keys[e.key]=false);

function resumeGame(){
paused=false;
document.getElementById("pauseMenu").style.display="none";
}

function spawnWave(){
wave++;
document.getElementById("waveCount").textContent=wave;
for(let i=0;i<wave*5;i++){
zombies.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:20,
hp:3+wave,
speed:1
});
}
}

function spawnEnvironment(){
for(let i=0;i<30;i++){
trees.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:30
});
}
for(let i=0;i<20;i++){
rocks.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:25
});
}
}

function movePlayer(){
let nx=player.x;
let ny=player.y;

if(keys["w"])ny-=player.speed;
if(keys["s"])ny+=player.speed;
if(keys["a"])nx-=player.speed;
if(keys["d"])nx+=player.speed;

if(!collision(nx,ny,player.size)){
player.x=nx;
player.y=ny;
}
}

function collision(x,y,size){
for(let t of trees){
if(Math.hypot(x-t.x,y-t.y)<size+t.size) return true;
}
for(let r of rocks){
if(Math.hypot(x-r.x,y-r.y)<size+r.size) return true;
}
return false;
}

function updateZombies(){
for(let z of zombies){
let target=base;
let dx=target.x-z.x;
let dy=target.y-z.y;
let dist=Math.hypot(dx,dy);

if(dist>5){
z.x+=dx/dist*z.speed;
z.y+=dy/dist*z.speed;
}else{
base.hp-=0.02;
document.getElementById("baseHP").textContent=Math.floor(base.hp);
}
}
}

function updateSoldiers(){
for(let s of soldiers){
let nearest=null;
let min=9999;
for(let z of zombies){
let d=Math.hypot(s.x-z.x,s.y-z.y);
if(d<min){min=d;nearest=z;}
}
if(nearest && min<200){
nearest.hp-=0.1;
}
}
zombies=zombies.filter(z=>z.hp>0);
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="green";
for(let t of trees){
ctx.beginPath();
ctx.arc(t.x,t.y,t.size,0,Math.PI*2);
ctx.fill();
}

ctx.fillStyle="gray";
for(let r of rocks){
ctx.beginPath();
ctx.arc(r.x,r.y,r.size,0,Math.PI*2);
ctx.fill();
}

ctx.fillStyle="blue";
ctx.beginPath();
ctx.arc(base.x,base.y,base.size,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(player.x,player.y,player.size,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="red";
for(let z of zombies){
ctx.beginPath();
ctx.arc(z.x,z.y,z.size,0,Math.PI*2);
ctx.fill();
}

ctx.fillStyle="cyan";
for(let s of soldiers){
ctx.beginPath();
ctx.arc(s.x,s.y,10,0,Math.PI*2);
ctx.fill();
}
}

function gameLoop(){
if(!paused){
movePlayer();
updateZombies();
updateSoldiers();

if(zombies.length===0){
spawnWave();
}

if(base.hp<=0){
alert("Base Destroyed!");
location.reload();
}
}

draw();
requestAnimationFrame(gameLoop);
}

spawnEnvironment();
spawnWave();
gameLoop();
</script>
</body>
</html>
