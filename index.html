<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

let coins = 0;
let kills = 0;
let gameRunning = false;
let keys = {};

let player = {
    x: canvas.width/2,
    y: canvas.height/2,
    speed: 4,
    health: 100,
    maxHealth: 100,
    weapon: "pistol",
    ammo: 10,
    maxAmmo: 10,
    reloading: false
};

let weapons = {
    pistol: { damage: 2, fireRate: 400, maxAmmo: 10 },
    smg: { damage: 1, fireRate: 100, maxAmmo: 30 },
    shotgun: { damage: 4, fireRate: 700, maxAmmo: 5 },
    rifle: { damage: 999, fireRate: 800, maxAmmo: 5 } // ONE SHOT KILL
};

let zombies = [];
let bullets = [];
let traps = [];
let lastShot = 0;

function updateCoins(){
    document.getElementById("coinsText").innerText = "Coins: " + coins;
}

function buyWeapon(type){
    if(type === "rifle" && coins >= 50){
        coins -= 50;
        player.weapon = "rifle";
        player.maxAmmo = weapons.rifle.maxAmmo;
        player.ammo = player.maxAmmo;
    }
    updateCoins();
}

function reload(){
    if(player.reloading) return;
    player.reloading = true;

    setTimeout(()=>{
        player.ammo = player.maxAmmo;
        player.reloading = false;
    },1500); // reload time
}

document.addEventListener("keydown", e=>{
    keys[e.key]=true;
    if(e.key === "r") reload();
});
document.addEventListener("keyup", e=> keys[e.key]=false);

document.addEventListener("click", ()=>{
    if(!gameRunning) return;

    let gun = weapons[player.weapon];
    if(Date.now() - lastShot < gun.fireRate) return;
    if(player.ammo <= 0) return;

    lastShot = Date.now();
    player.ammo--;

    bullets.push({
        x: player.x,
        y: player.y,
        damage: gun.damage
    });
});

function spawnZombies(){
    setInterval(()=>{
        if(!gameRunning) return;

        // Boss every 100 kills
        if(kills > 0 && kills % 100 === 0){
            zombies.push({
                x: Math.random()*canvas.width,
                y: Math.random()*canvas.height,
                health: 200,
                boss: true
            });
            kills++; // prevent multiple boss spawns
        } else {
            zombies.push({
                x: Math.random()*canvas.width,
                y: Math.random()*canvas.height,
                health: 8,
                boss: false
            });
        }
    },2000);
}

function startGame(){
    document.getElementById("shopMenu").style.display="none";
    canvas.requestPointerLock();
    gameRunning = true;
    spawnZombies();
}

function update(){
    if(!gameRunning) return;

    if(keys["w"]) player.y -= player.speed;
    if(keys["s"]) player.y += player.speed;
    if(keys["a"]) player.x -= player.speed;
    if(keys["d"]) player.x += player.speed;

    zombies.forEach((z, zi)=>{
        let dx = player.x - z.x;
        let dy = player.y - z.y;
        let d = Math.hypot(dx,dy);

        z.x += dx/d * (z.boss ? 0.5 : 1);
        z.y += dy/d * (z.boss ? 0.5 : 1);

        if(d < 20) player.health -= z.boss ? 1 : 0.4;

        bullets.forEach((b, bi)=>{
            if(Math.hypot(z.x - b.x, z.y - b.y) < 20){
                z.health -= b.damage;
                bullets.splice(bi,1);

                if(z.health <= 0){
                    zombies.splice(zi,1);
                    coins += z.boss ? 50 : 5;
                    kills++;
                    updateCoins();
                }
            }
        });
    });

    draw();
    requestAnimationFrame(update);
}

function draw(){
    ctx.fillStyle="#111";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // Player
    ctx.fillStyle="blue";
    ctx.beginPath();
    ctx.arc(player.x,player.y,15,0,Math.PI*2);
    ctx.fill();

    // Zombies
    zombies.forEach(z=>{
        ctx.fillStyle = z.boss ? "purple" : "green";
        ctx.beginPath();
        ctx.arc(z.x,z.y,z.boss ? 25 : 15,0,Math.PI*2);
        ctx.fill();
    });

    ctx.fillStyle="white";
    ctx.fillText("HP: "+Math.floor(player.health),20,30);
    ctx.fillText("Weapon: "+player.weapon,20,50);
    ctx.fillText("Ammo: "+player.ammo+"/"+player.maxAmmo,20,70);
    ctx.fillText("Kills: "+kills,20,90);
    ctx.fillText("Coins: "+coins,20,110);

    if(player.reloading){
        ctx.fillStyle="yellow";
        ctx.fillText("RELOADING...", canvas.width/2-50, canvas.height/2);
    }

    if(player.health <= 0){
        ctx.fillStyle="red";
        ctx.font="50px Arial";
        ctx.fillText("GAME OVER", canvas.width/2-150, canvas.height/2);
        gameRunning = false;
    }
}

update();
</script>
