<!DOCTYPE html>
<html>
<head>
<title>Zombie Survival</title>
<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; background:#1a1a1a; }

#menu, #upgrade, #shop {
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
color:white;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
}

button{
padding:12px 25px;
margin:10px;
font-size:18px;
cursor:pointer;
}

#upgrade, #shop{ display:none; }
</style>
</head>
<body>

<div id="menu">
<h1>Zombie Survival</h1>
<button onclick="startGame()">Start Game</button>
</div>

<div id="upgrade">
<h2>Choose Upgrade</h2>
<button onclick="applyUpgrade('speed')">Speed +5%</button>
<button onclick="applyUpgrade('damage')">Damage +5%</button>
<button onclick="applyUpgrade('health')">Health +5%</button>
</div>

<div id="shop">
<h2>SHOP</h2>
<p>Money: $<span id="moneyDisplay">0</span></p>
<button onclick="buyHeal()">Heal ($100)</button>
<button onclick="buyDamage()">Damage +10% ($200)</button>
<button onclick="buySpeed()">Speed +10% ($200)</button>
<button onclick="buyMag()">+10 Magazine ($300)</button>
<button onclick="closeShop()">Close Shop</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let gameRunning=false;
let keys={};
let mouseX=0, mouseY=0;
let mouseDown=false;

let player={
x:0,y:0,size:20,
speed:4,
health:100,maxHealth:100,
damage:1,
ammo:30,maxAmmo:30,
reloading:false,
money:0
};

let zombies=[];
let bullets=[];
let kills=0;
let spawnRate=2;
let lastShot=0;

let walls=[
{ x:-1000,y:-1000,w:2000,h:20 },
{ x:-1000,y:980,w:2000,h:20 },
{ x:-1000,y:-1000,w:20,h:2000 },
{ x:980,y:-1000,w:20,h:2000 }
];

function startGame(){
document.getElementById("menu").style.display="none";
gameRunning=true;
spawnWave();
update();
}

// CONTROLS
document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true;
if(e.key==="r") reload();
if(e.key==="e") openShop();
});
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);
document.addEventListener("mousemove",e=>{
mouseX=e.clientX;
mouseY=e.clientY;
});
document.addEventListener("mousedown",()=>mouseDown=true);
document.addEventListener("mouseup",()=>mouseDown=false);

// AUTO SHOOT
function shoot(){
if(!gameRunning) return;
if(player.reloading) return;
if(player.ammo<=0) return;

let now=Date.now();
if(now-lastShot<100) return;
lastShot=now;

let angle=Math.atan2(mouseY-canvas.height/2,mouseX-canvas.width/2);

bullets.push({
x:player.x,
y:player.y,
dx:Math.cos(angle)*12,
dy:Math.sin(angle)*12
});

player.ammo--;
}

function reload(){
if(player.reloading) return;
if(player.ammo===player.maxAmmo) return;

player.reloading=true;
setTimeout(()=>{
player.ammo=player.maxAmmo;
player.reloading=false;
},1200);
}

// SPAWN
function spawnZombie(){
let angle=Math.random()*Math.PI*2;
zombies.push({
x:player.x+Math.cos(angle)*800,
y:player.y+Math.sin(angle)*800,
size:20,
speed:1,
health:2
});
}

function spawnWave(){
for(let i=0;i<spawnRate;i++) spawnZombie();
}

// UPGRADE
function applyUpgrade(type){
if(type==="speed") player.speed*=1.05;
if(type==="damage") player.damage*=1.05;
if(type==="health"){
player.maxHealth*=1.05;
player.health=player.maxHealth;
}
document.getElementById("upgrade").style.display="none";
gameRunning=true;
update();
}

// SHOP
function openShop(){
if(!gameRunning) return;
gameRunning=false;
document.getElementById("shop").style.display="flex";
document.getElementById("moneyDisplay").innerText=player.money;
}

function closeShop(){
document.getElementById("shop").style.display="none";
gameRunning=true;
update();
}

function buyHeal(){
if(player.money>=100){
player.money-=100;
player.health=Math.min(player.maxHealth,player.health+50);
updateMoney();
}
}

function buyDamage(){
if(player.money>=200){
player.money-=200;
player.damage*=1.1;
updateMoney();
}
}

function buySpeed(){
if(player.money>=200){
player.money-=200;
player.speed*=1.1;
updateMoney();
}
}

function buyMag(){
if(player.money>=300){
player.money-=300;
player.maxAmmo+=10;
player.ammo=player.maxAmmo;
updateMoney();
}
}

function updateMoney(){
document.getElementById("moneyDisplay").innerText=player.money;
}

// COLLISION
function wallCollision(obj){
walls.forEach(w=>{
if(obj.x+obj.size>w.x && obj.x-obj.size<w.x+w.w &&
obj.y+obj.size>w.y && obj.y-obj.size<w.y+w.h){
if(obj.x<w.x) obj.x=w.x-obj.size;
if(obj.x>w.x+w.w) obj.x=w.x+w.w+obj.size;
if(obj.y<w.y) obj.y=w.y-obj.size;
if(obj.y>w.y+w.h) obj.y=w.y+w.h+obj.size;
}
});
}

// UPDATE LOOP
function update(){
if(!gameRunning) return;

ctx.clearRect(0,0,canvas.width,canvas.height);

if(keys["w"]) player.y-=player.speed;
if(keys["s"]) player.y+=player.speed;
if(keys["a"]) player.x-=player.speed;
if(keys["d"]) player.x+=player.speed;

wallCollision(player);

if(mouseDown) shoot();

ctx.save();
ctx.translate(canvas.width/2-player.x,canvas.height/2-player.y);

// WALLS
ctx.fillStyle="gray";
walls.forEach(w=>ctx.fillRect(w.x,w.y,w.w,w.h));

// PLAYER
ctx.fillStyle="blue";
ctx.beginPath();
ctx.arc(player.x,player.y,player.size,0,Math.PI*2);
ctx.fill();

// ZOMBIES
zombies.forEach((z,zi)=>{
let dx=player.x-z.x;
let dy=player.y-z.y;
let dist=Math.hypot(dx,dy);

z.x+=(dx/dist)*z.speed;
z.y+=(dy/dist)*z.speed;

ctx.fillStyle="green";
ctx.beginPath();
ctx.arc(z.x,z.y,z.size,0,Math.PI*2);
ctx.fill();

if(dist<z.size+player.size){
player.health-=0.2;
}
});

// BULLETS
bullets.forEach((b,bi)=>{
b.x+=b.dx;
b.y+=b.dy;

ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(b.x,b.y,4,0,Math.PI*2);
ctx.fill();

zombies.forEach((z,zi)=>{
if(Math.hypot(b.x-z.x,b.y-z.y)<z.size){
zombies.splice(zi,1);
bullets.splice(bi,1);
kills++;
player.money+=50;

if(kills%10===0){
gameRunning=false;
document.getElementById("upgrade").style.display="flex";
spawnRate++;
return;
}

spawnZombie();
}
});
});

ctx.restore();

// UI
ctx.fillStyle="white";
ctx.fillText("Health: "+Math.floor(player.health),20,30);
ctx.fillText("Kills: "+kills,20,50);
ctx.fillText("Money: $"+player.money,20,70);
ctx.fillText("Ammo: "+player.ammo+"/"+player.maxAmmo,20,90);
ctx.fillText("Press R to Reload | E for Shop",20,110);
if(player.reloading) ctx.fillText("Reloading...",20,130);

requestAnimationFrame(update);
}
</script>
</body>
</html>
